<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Master Blaster</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
width: 100%; height: 100%;
background: #000;
overflow: hidden;
font-family: ‘Press Start 2P’, monospace;
touch-action: none;
}

canvas {
display: block;
position: absolute;
top: 0; left: 0;
}

#hud {
position: absolute;
top: 0; left: 0;
width: 100%; height: 100%;
pointer-events: none;
}

#topbar {
position: absolute;
top: 0; left: 0; right: 0;
display: flex;
justify-content: space-between;
align-items: center;
padding: 8px 14px;
background: rgba(0,0,0,0.85);
border-bottom: 1px solid #00ff9966;
pointer-events: none;
}
.pinfo { font-size: clamp(14px, 3.6vw, 22px); line-height: 1.8; }
.p1c { color: #4fc3f7; }
.p2c { color: #ef9a9a; }
#turn-banner { font-size: clamp(14px, 3.2vw, 20px); color: #ffd54f; text-align: center; }
#wind-display { font-size: clamp(12px, 2.8vw, 18px); color: #e0d0ff; text-align: center; margin-top: 3px; }

#message {
position: absolute;
top: 40%; left: 50%;
transform: translate(-50%, -50%);
font-size: clamp(14px, 4vw, 24px);
color: #ffd54f;
text-shadow: 0 0 20px #ffd54f88;
text-align: center;
pointer-events: none;
opacity: 0;
transition: opacity 0.5s;
white-space: pre-line;
}

.btn {
position: absolute;
pointer-events: all;
background: rgba(0,0,0,0.3);
border: 2px solid rgba(255,255,255,0.3);
border-radius: 10px;
color: white;
font-family: ‘Press Start 2P’, monospace;
font-size: clamp(10px, 3vw, 18px);
display: flex;
align-items: center;
justify-content: center;
user-select: none;
-webkit-user-select: none;
cursor: pointer;
}
.btn.pressed { background: rgba(255,255,255,0.25); }

#btn-aim-up   { bottom: 140px; left: 20px; width: 60px; height: 60px; }
#btn-aim-down { bottom: 70px;  left: 20px; width: 60px; height: 60px; }
#btn-left     { bottom: 105px; left: 90px;  width: 60px; height: 60px; }
#btn-right    { bottom: 105px; left: 160px; width: 60px; height: 60px; }
#btn-fire     { bottom: 70px; right: 20px; width: 90px; height: 90px; font-size: clamp(8px, 2vw, 13px); background: rgba(200,60,60,0.45); border-color: #ef5350; }
#btn-restart  { bottom: 170px; right: 20px; width: 60px; height: 28px; font-size: clamp(5px, 1.2vw, 8px); }

#kb-hint {
position: absolute;
bottom: 8px; left: 50%;
transform: translateX(-50%);
font-size: 7px;
color: rgba(255,255,255,0.3);
pointer-events: none;
white-space: nowrap;
}
</style>

</head>
<body>

<canvas id="c"></canvas>

<div id="hud">
  <div id="topbar">
    <div class="pinfo p1c" id="p1-info">P1 ❤️❤️❤️</div>
    <div>
      <div id="turn-banner">— P1's TURN —</div>
      <div id="wind-display">WIND: ➡️ 0</div>
    </div>
    <div class="pinfo p2c" id="p2-info">P2 ❤️❤️❤️</div>
  </div>

  <div id="message"></div>

  <div class="btn" id="btn-aim-up"><svg width="24" height="24" viewBox="0 0 24 24"><polygon points="12,3 22,20 2,20" fill="white"/></svg></div>
  <div class="btn" id="btn-aim-down"><svg width="24" height="24" viewBox="0 0 24 24"><polygon points="12,21 22,4 2,4" fill="white"/></svg></div>
  <div class="btn" id="btn-left"><svg width="24" height="24" viewBox="0 0 24 24"><polygon points="3,12 20,2 20,22" fill="white"/></svg></div>
  <div class="btn" id="btn-right"><svg width="24" height="24" viewBox="0 0 24 24"><polygon points="21,12 4,2 4,22" fill="white"/></svg></div>
  <div class="btn" id="btn-fire">FIRE</div>
  <div class="btn" id="btn-restart">R</div>

  <div id="kb-hint">↑↓ Aim &nbsp;|&nbsp; ←→ Move &nbsp;|&nbsp; SPACE Fire &nbsp;|&nbsp; R Restart</div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const GW = 630, GH = 420;
let scale = 1, offX = 0, offY = 0;

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  const sx = window.innerWidth  / GW;
  const sy = window.innerHeight / GH;
  scale = Math.min(sx, sy);
  offX = (window.innerWidth  - GW * scale) / 2;
  offY = (window.innerHeight - GH * scale) / 2;
}
window.addEventListener('resize', resize);
resize();

function applyScale()  { ctx.setTransform(scale, 0, 0, scale, offX, offY); }
function resetTransform() { ctx.setTransform(1, 0, 0, 1, 0, 0); }

// ---- TERRAIN ----
const terrainY = new Float32Array(GW);
function generateTerrain() {
  const points = [];
  for (let x = 0; x <= GW; x += 100)
    points.push({ x, y: 260 + Math.random() * 80 });
  for (let x = 0; x < GW; x++) {
    let p0 = points.findLast(p => p.x <= x) || points[0];
    let p1 = points.find(p => p.x > x) || points[points.length - 1];
    let t = p0.x === p1.x ? 0 : (x - p0.x) / (p1.x - p0.x);
    t = t * t * (3 - 2 * t);
    terrainY[x] = p0.y + (p1.y - p0.y) * t;
  }
}

function blastTerrain(cx, cy, radius) {
  for (let x = Math.max(0, Math.floor(cx - radius)); x < Math.min(GW, Math.ceil(cx + radius)); x++) {
    const dist = Math.abs(x - cx);
    const depth = Math.sqrt(Math.max(0, radius * radius - dist * dist));
    const surfaceAtX = terrainY[x];
    const impactDepth = cy + depth * 0.7;
    if (Math.abs(surfaceAtX - cy) < radius * 1.2)
      terrainY[x] = Math.min(GH - 5, Math.max(surfaceAtX, impactDepth));
  }
}

// ---- PLAYERS ----
let players, currentPlayer, wind, gameOver;

function placeOnTerrain(x) { return { x, y: terrainY[Math.round(x)] }; }

let projectile = null, particles = [], powerCharge = 0, charging = false;
let fireCooldown = false, hasMoved = false, moveDist = 0;
const maxMove = 80;

function initGame() {
  generateTerrain();
  pickTerrainColor();
  generateBackground();
  wind = (Math.random() - 0.5) * 10;
  gameOver = false; fireCooldown = false; hasMoved = false; moveDist = 0;
  document.getElementById('message').style.opacity = '0';
  const p1 = placeOnTerrain(80), p2 = placeOnTerrain(550);
  players = [
    { x: p1.x, y: p1.y, angle: -20, hp: 3, color: '#4fc3f7', name: 'P1', facing:  1 },
    { x: p2.x, y: p2.y, angle: -20, hp: 3, color: '#ef9a9a', name: 'P2', facing: -1 },
  ];
  currentPlayer = 0; projectile = null; particles = [];
  powerCharge = 0; charging = false;
  updateUI();
}

function fire() {
  if (projectile || fireCooldown || gameOver) return;
  const p = players[currentPlayer];
  const power = 4.21 + powerCharge * 0.112;
  const tilt = getTerrainSlope(p.x);
  // Build world angle: start from facing direction, add tilt, add aim angle
  const baseAngle = p.facing === 1 ? 0 : Math.PI;
  const aimRad = p.angle * Math.PI / 180 * p.facing;
  const worldRad = baseAngle + aimRad + tilt;
  const spawnDist = 26;
  projectile = {
    x: p.x + Math.cos(worldRad) * spawnDist,
    y: (p.y - 12) + Math.sin(worldRad) * spawnDist,
    vx: Math.cos(worldRad) * power,
    vy: Math.sin(worldRad) * power,
    trail: [],
    color: p.color,
  };
  powerCharge = 0; charging = false;
  soundBlaster();
}

function spawnParticles(x, y, color) {
  for (let i = 0; i < 28; i++) {
    const a = Math.random() * Math.PI * 2, spd = 1 + Math.random() * 5;
    particles.push({ x, y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd,
      life: 1, decay: 0.02 + Math.random()*0.03, r: 2 + Math.random()*4, color });
  }
}

// ---- SOUND ----
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function soundBlaster() {
  try {
    const ac = getAudio();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(880, ac.currentTime);
    osc.frequency.exponentialRampToValueAtTime(120, ac.currentTime + 0.18);
    gain.gain.setValueAtTime(0.35, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.18);
    osc.start(ac.currentTime);
    osc.stop(ac.currentTime + 0.18);
  } catch(e) {}
}

function soundImpact() {
  try {
    const ac = getAudio();
    // Noise burst
    const bufLen = ac.sampleRate * 0.25;
    const buf = ac.createBuffer(1, bufLen, ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) data[i] = (Math.random() * 2 - 1);
    const noise = ac.createBufferSource();
    noise.buffer = buf;
    // Low pass filter for thud
    const filter = ac.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(600, ac.currentTime);
    filter.frequency.exponentialRampToValueAtTime(80, ac.currentTime + 0.2);
    const gain = ac.createGain();
    gain.gain.setValueAtTime(0.6, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.25);
    noise.connect(filter); filter.connect(gain); gain.connect(ac.destination);
    noise.start(ac.currentTime);
    noise.stop(ac.currentTime + 0.25);
    // Low thud tone underneath
    const osc = ac.createOscillator();
    const og = ac.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(120, ac.currentTime);
    osc.frequency.exponentialRampToValueAtTime(40, ac.currentTime + 0.2);
    og.gain.setValueAtTime(0.4, ac.currentTime);
    og.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.2);
    osc.connect(og); og.connect(ac.destination);
    osc.start(ac.currentTime); osc.stop(ac.currentTime + 0.2);
  } catch(e) {}
}

function soundHit() {
  try {
    const ac = getAudio();
    // Higher pitched zap for hitting a player
    [300, 200, 100].forEach((freq, i) => {
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.type = 'square';
      osc.frequency.setValueAtTime(freq, ac.currentTime + i * 0.06);
      gain.gain.setValueAtTime(0.25, ac.currentTime + i * 0.06);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + i * 0.06 + 0.08);
      osc.connect(gain); gain.connect(ac.destination);
      osc.start(ac.currentTime + i * 0.06);
      osc.stop(ac.currentTime + i * 0.06 + 0.08);
    });
  } catch(e) {}
}


const keys = {};
window.addEventListener('keydown', e => {
  if (e.code === 'KeyR') { initGame(); return; }
  if (gameOver) return;
  keys[e.code] = true;
  if (e.code === 'Space' && !projectile && !fireCooldown) { charging = true; e.preventDefault(); }
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup', e => {
  keys[e.code] = false;
  if (e.code === 'Space' && charging) { charging = false; fire(); }
});

// ---- TOUCH BUTTONS ----
function holdBtn(id, keyCode) {
  const el = document.getElementById(id);
  const dn = () => { keys[keyCode] = true;  el.classList.add('pressed'); };
  const up = () => { keys[keyCode] = false; el.classList.remove('pressed'); };
  el.addEventListener('touchstart', e => { e.preventDefault(); dn(); }, { passive: false });
  el.addEventListener('touchend',   e => { e.preventDefault(); up(); }, { passive: false });
  el.addEventListener('mousedown', dn);
  el.addEventListener('mouseup', up);
  el.addEventListener('mouseleave', up);
}
holdBtn('btn-aim-up',   'ArrowUp');
holdBtn('btn-aim-down', 'ArrowDown');
holdBtn('btn-left',  'ArrowLeft');
holdBtn('btn-right', 'ArrowRight');

const fireBtn = document.getElementById('btn-fire');
const fdn = e => { e.preventDefault(); if (!projectile && !fireCooldown && !gameOver) { charging = true; fireBtn.classList.add('pressed'); } };
const fup = e => { e.preventDefault(); fireBtn.classList.remove('pressed'); if (charging) { charging = false; fire(); } };
fireBtn.addEventListener('touchstart', fdn, { passive: false });
fireBtn.addEventListener('touchend',   fup, { passive: false });
fireBtn.addEventListener('mousedown', fdn);
fireBtn.addEventListener('mouseup', fup);
fireBtn.addEventListener('mouseleave', fup);

const restartBtn = document.getElementById('btn-restart');
restartBtn.addEventListener('click', initGame);
restartBtn.addEventListener('touchstart', e => { e.preventDefault(); initGame(); }, { passive: false });

// ---- UI ----
function updateUI() {
  const h = n => '❤️'.repeat(n) + '🖤'.repeat(3-n);
  document.getElementById('p1-info').textContent = `P1 ${h(players[0].hp)}`;
  document.getElementById('p2-info').textContent = `P2 ${h(players[1].hp)}`;
  document.getElementById('turn-banner').textContent = `— ${players[currentPlayer].name}'s TURN —`;
  const wArrow = wind > 0 ? '➡️' : '⬅️';
  const wCount = Math.max(1, Math.ceil(Math.abs(wind) / 2));
  document.getElementById('wind-display').textContent = `WIND: ${wArrow.repeat(wCount)} ${Math.abs(wind).toFixed(1)}`;
}

function showMessage(txt) {
  const el = document.getElementById('message');
  el.textContent = txt; el.style.opacity = '1';
}

// ---- DRAW ----
// Tron color palette - picked fresh each game
const TRON_COLORS = ['#00ff99','#00cfff','#ff00cc','#ffcc00','#ff4400','#aa00ff','#00ffff'];
let terrainColor = TRON_COLORS[0];
let buildingColor = TRON_COLORS[1];

function pickTerrainColor() {
  const idx = Math.floor(Math.random() * TRON_COLORS.length);
  terrainColor = TRON_COLORS[idx];
  // Pick building color from remaining options
  const remaining = TRON_COLORS.filter((_, i) => i !== idx);
  buildingColor = remaining[Math.floor(Math.random() * remaining.length)];
  document.getElementById('topbar').style.borderBottomColor = terrainColor + '66';
}

// Pre-generate background elements once
let bgStars = [], bgGrid = [], bgMoon = null, bgBuildings = [];
function generateBackground() {
  // Stars
  bgStars = Array.from({length: 80}, () => ({
    x: Math.random() * GW, y: Math.random() * GH * 0.6,
    r: Math.random() < 0.15 ? 1.5 : 0.7,
    flicker: Math.random() * Math.PI * 2,
  }));
  // Moon position
  bgMoon = { x: 80 + Math.random() * (GW - 160), y: 40 + Math.random() * 80, r: 28 + Math.random() * 18 };
  // Distant buildings (silhouette)
  bgBuildings = Array.from({length: 14}, (_, i) => {
    const w = 18 + Math.random() * 40;
    const h = 30 + Math.random() * 120;
    const x = (GW / 13) * i + Math.random() * 20 - 10;
    return { x, w, h, windows: Array.from({length: Math.floor(h/18)}, () =>
      Array.from({length: Math.floor(w/10)}, () => Math.random() < 0.4)) };
  });
}

function flashMoonShot() {
  const el = document.getElementById('message');
  el.textContent = '🌙 MOONSHOT! ×2';
  el.style.opacity = '1';
  el.style.color = '#ffffff';
  el.style.textShadow = '0 0 30px #ffffff, 0 0 60px ' + terrainColor;
  setTimeout(() => {
    el.style.opacity = '0';
    el.style.color = '#ffd54f';
    el.style.textShadow = '0 0 20px #ffd54f88';
  }, 1800);
}

function drawTerrain() {
  const tc = terrainColor;

  // Black background
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, GW, GH);

  // Stars
  const now = Date.now() * 0.001;
  bgStars.forEach(s => {
    const alpha = 0.4 + 0.35 * Math.sin(s.flicker + now);
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${alpha.toFixed(2)})`;
    ctx.fill();
  });

  // Moon
  if (bgMoon) {
    const m = bgMoon;
    // Outer glow
    const moonGlow = ctx.createRadialGradient(m.x, m.y, m.r * 0.8, m.x, m.y, m.r * 2.2);
    moonGlow.addColorStop(0, tc + '22');
    moonGlow.addColorStop(1, 'transparent');
    ctx.beginPath(); ctx.arc(m.x, m.y, m.r * 2.2, 0, Math.PI*2);
    ctx.fillStyle = moonGlow; ctx.fill();
    // Moon body
    const moonGrad = ctx.createRadialGradient(m.x - m.r*0.3, m.y - m.r*0.3, m.r*0.1, m.x, m.y, m.r);
    moonGrad.addColorStop(0, '#ddeeff');
    moonGrad.addColorStop(0.6, '#99aabb');
    moonGrad.addColorStop(1, '#445566');
    ctx.beginPath(); ctx.arc(m.x, m.y, m.r, 0, Math.PI*2);
    ctx.fillStyle = moonGrad; ctx.fill();
    // Tron ring around moon
    ctx.beginPath(); ctx.arc(m.x, m.y, m.r + 5, 0, Math.PI*2);
    ctx.strokeStyle = tc + '88'; ctx.lineWidth = 1.5;
    ctx.shadowColor = tc; ctx.shadowBlur = 8; ctx.stroke(); ctx.shadowBlur = 0;
    // Craters
    [[0.3, 0.2, 5], [-0.4, -0.1, 3], [0.1, -0.4, 4], [-0.2, 0.4, 2.5]].forEach(([dx,dy,cr]) => {
      ctx.beginPath(); ctx.arc(m.x + dx*m.r, m.y + dy*m.r, cr, 0, Math.PI*2);
      ctx.fillStyle = '#33445588'; ctx.fill();
    });
  }

  // Distant buildings silhouette
  const horizonY = Math.min(...Array.from(terrainY)) - 10;
  bgBuildings.forEach(b => {
    const top = horizonY - b.h;
    ctx.fillStyle = '#050510';
    ctx.fillRect(b.x, top, b.w, b.h + 20);
    // Tron outline
    ctx.strokeStyle = buildingColor + '44'; ctx.lineWidth = 0.8;
    ctx.strokeRect(b.x, top, b.w, b.h);
    // Windows
    b.windows.forEach((row, ri) => {
      row.forEach((lit, ci) => {
        if (!lit) return;
        ctx.fillStyle = buildingColor + '66';
        ctx.fillRect(b.x + 3 + ci*10, top + 4 + ri*18, 6, 10);
      });
    });
  });

  // Terrain fill
  ctx.beginPath();
  ctx.moveTo(0, GH);
  for (let x = 0; x < GW; x++) ctx.lineTo(x, terrainY[x]);
  ctx.lineTo(GW, GH);
  ctx.closePath();
  ctx.fillStyle = '#05050f';
  ctx.fill();

  // Grid on terrain surface only
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(0, GH);
  for (let x = 0; x < GW; x++) ctx.lineTo(x, terrainY[x]);
  ctx.lineTo(GW, GH);
  ctx.closePath();
  ctx.clip();
  ctx.strokeStyle = tc + '28'; ctx.lineWidth = 0.5;
  for (let y = 0; y < GH; y += 20) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(GW, y); ctx.stroke();
  }
  for (let x = 0; x < GW; x += 20) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, GH); ctx.stroke();
  }
  ctx.restore();

  // Neon terrain edge
  ctx.save();
  ctx.shadowColor = tc; ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.moveTo(0, terrainY[0]);
  for (let x = 1; x < GW; x++) ctx.lineTo(x, terrainY[x]);
  ctx.strokeStyle = tc; ctx.lineWidth = 2; ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.restore();
}

function getTerrainSlope(x) {
  const x0 = Math.max(0, Math.floor(x) - 6);
  const x1 = Math.min(GW - 1, Math.floor(x) + 6);
  return Math.atan2(terrainY[x1] - terrainY[x0], x1 - x0);
}

function drawPlayer(p, idx) {
  const isActive = idx === currentPlayer && !projectile;
  const c = p.color;
  // Angle is always stored as right-facing (0 to -40), facing flips the whole craft
  const rad = p.angle * Math.PI / 180;
  const tilt = getTerrainSlope(p.x);

  ctx.save();
  ctx.translate(p.x, p.y);

  // Glow (before flip so it stays symmetrical)
  const gr = 18 + Math.sin(Date.now() * 0.005 + idx) * 3;
  const glow = ctx.createRadialGradient(0, 4, 2, 0, 4, gr);
  glow.addColorStop(0, c + 'aa'); glow.addColorStop(1, c + '00');
  ctx.beginPath(); ctx.ellipse(0, 6, gr, 8, 0, 0, Math.PI*2);
  ctx.fillStyle = glow; ctx.fill();

  // Apply terrain tilt then facing flip — everything below is mirrored correctly
  ctx.rotate(tilt);
  ctx.scale(p.facing, 1);

  // Hull underside
  ctx.beginPath(); ctx.ellipse(0, 2, 18, 5, 0, 0, Math.PI*2);
  ctx.fillStyle = '#1a1a2e'; ctx.fill();
  ctx.strokeStyle = c; ctx.lineWidth = 1.5; ctx.stroke();

  // Hull body
  ctx.beginPath(); ctx.moveTo(-18,0); ctx.lineTo(-14,-10);
  ctx.lineTo(14,-10); ctx.lineTo(18,0); ctx.closePath();
  ctx.fillStyle = '#1e1e3a'; ctx.fill();
  ctx.strokeStyle = c; ctx.lineWidth = 1.2; ctx.stroke();

  // Accent stripe
  ctx.beginPath(); ctx.moveTo(-10,-10); ctx.lineTo(10,-10);
  ctx.strokeStyle = c+'cc'; ctx.lineWidth = 2; ctx.stroke();

  // Vents
  [-13,10].forEach(vx => {
    ctx.fillStyle = c+'66'; ctx.fillRect(vx,-7,3,4);
    ctx.strokeStyle = c; ctx.lineWidth = 0.5; ctx.strokeRect(vx,-7,3,4);
  });

  // Turret dome
  ctx.beginPath(); ctx.ellipse(0,-12,9,6,0,0,Math.PI*2);
  ctx.fillStyle = '#2a2a4a'; ctx.fill();
  ctx.strokeStyle = c; ctx.lineWidth = 1.2; ctx.stroke();
  ctx.beginPath(); ctx.ellipse(-2,-14,4,2,-0.3,0,Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.08)'; ctx.fill();

  // Cannon — inside hull-local space (already scaled by facing and rotated by tilt)
  // Just rotate by the aim angle; facing+tilt are already applied by ctx transforms
  ctx.save();
  ctx.translate(0,-12);
  ctx.rotate(rad);
  ctx.fillStyle = '#333355';
  ctx.beginPath(); ctx.roundRect(2,-2.5,20,5,2); ctx.fill();
  ctx.strokeStyle = c; ctx.lineWidth = 1; ctx.stroke();
  ctx.beginPath(); ctx.arc(22,0,3,0,Math.PI*2);
  ctx.fillStyle = c; ctx.fill();
  ctx.shadowColor = c; ctx.shadowBlur = 8; ctx.fill(); ctx.shadowBlur = 0;
  ctx.restore();

  // Active ring
  if (isActive) {
    ctx.strokeStyle = 'rgba(255,255,100,0.5)';
    ctx.lineWidth = 1.2; ctx.setLineDash([3,4]);
    ctx.beginPath(); ctx.arc(0,-10,22,0,Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);
  }

  ctx.restore();

  // Name label (outside transform)
  ctx.fillStyle = p.color;
  ctx.font = '7px "Press Start 2P"';
  ctx.textAlign = 'center';
  ctx.fillText(p.name, p.x, p.y - 34);
}

function drawProjectile() {
  if (!projectile) return;
  const c = projectile.color;
  const ms = projectile.moonShot;
  projectile.trail.forEach((pt, i) => {
    const a = i / projectile.trail.length;
    ctx.beginPath(); ctx.arc(pt.x, pt.y, (ms ? 3.5 : 2) * a, 0, Math.PI*2);
    ctx.fillStyle = ms
      ? `rgba(255,255,255,${(a * 0.5).toFixed(2)})`
      : c + Math.floor(a * 0.6 * 255).toString(16).padStart(2,'0');
    ctx.fill();
  });
  ctx.beginPath(); ctx.arc(projectile.x, projectile.y, ms ? 7 : 5, 0, Math.PI*2);
  const g = ctx.createRadialGradient(projectile.x-1, projectile.y-1, 1, projectile.x, projectile.y, ms ? 7 : 5);
  g.addColorStop(0,'#fff'); g.addColorStop(0.4, c); g.addColorStop(1, c + 'aa');
  ctx.fillStyle = g; ctx.fill();
  ctx.shadowColor = ms ? '#ffffff' : c;
  ctx.shadowBlur = ms ? 22 : 12;
  ctx.fill(); ctx.shadowBlur = 0;
}

function drawPower() {
  if (!charging) return;
  const p = players[currentPlayer];
  const pct = powerCharge / 100, barW = 60;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(p.x - barW/2, p.y - 50, barW, 8);
  const g = ctx.createLinearGradient(p.x - barW/2, 0, p.x + barW/2, 0);
  g.addColorStop(0,'#66bb6a'); g.addColorStop(0.6,'#ffd54f'); g.addColorStop(1,'#ef5350');
  ctx.fillStyle = g;
  ctx.fillRect(p.x - barW/2, p.y - 50, barW * pct, 8);
  ctx.strokeStyle = '#fff4'; ctx.lineWidth = 1;
  ctx.strokeRect(p.x - barW/2, p.y - 50, barW, 8);
  ctx.fillStyle = '#fff'; ctx.font = '6px "Press Start 2P"';
  ctx.textAlign = 'center'; ctx.fillText('POWER', p.x, p.y - 53);
}

function drawParticles() {
  particles.forEach(p => {
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI*2);
    ctx.fillStyle = p.color + Math.floor(p.life*255).toString(16).padStart(2,'0');
    ctx.fill();
  });
}

function drawAngleGuide() {
  if (projectile) return;
  const p = players[currentPlayer];
  ctx.fillStyle = terrainColor + 'cc';
  ctx.font = '7px "Press Start 2P"';
  ctx.textAlign = 'center';
  ctx.fillText(`${Math.round(p.angle)}°`, p.x, p.y - 42);
}

// ---- UPDATE ----
function switchTurn() {
  currentPlayer = 1 - currentPlayer;
  fireCooldown = false; hasMoved = false; moveDist = 0;
  players.forEach(p => { p.y = terrainY[Math.round(p.x)]; });
  const bigGust = Math.random() < 0.25;
  const shift = bigGust ? (Math.random() - 0.5) * 10 : (Math.random() - 0.5) * 4;
  wind = Math.max(-5, Math.min(5, wind + shift));
  updateUI();
}

function update() {
  if (gameOver) return;
  const p = players[currentPlayer];
  if (!projectile && !fireCooldown) {
    if (keys['ArrowUp'])   p.angle = Math.max(-40, p.angle - 1.5);
    if (keys['ArrowDown']) p.angle = Math.min(0,   p.angle + 1.5);
    if (keys['ArrowLeft'] && !hasMoved) {
      p.x = Math.max(10, p.x - 0.4);
      p.y = terrainY[Math.max(0, Math.min(GW-1, Math.round(p.x)))];
      moveDist += 0.4;
      if (p.facing === 1) { p.facing = -1; p.angle = Math.max(-40, Math.min(0, p.angle)); }
      if (moveDist >= maxMove) { hasMoved = true; keys['ArrowLeft'] = false; }
    }
    if (keys['ArrowRight'] && !hasMoved) {
      p.x = Math.min(GW-10, p.x + 0.4);
      p.y = terrainY[Math.max(0, Math.min(GW-1, Math.round(p.x)))];
      moveDist += 0.4;
      if (p.facing === -1) { p.facing = 1; p.angle = Math.max(-40, Math.min(0, p.angle)); }
      if (moveDist >= maxMove) { hasMoved = true; keys['ArrowRight'] = false; }
    }
    if (charging && powerCharge < 100) powerCharge = Math.min(100, powerCharge + 1.2);
  }

  if (projectile) {
    projectile.trail.push({ x: projectile.x, y: projectile.y });
    if (projectile.trail.length > 30) projectile.trail.shift();
    projectile.vx += wind * 0.013;
    projectile.vy += 0.25;
    projectile.x += projectile.vx;
    projectile.y += projectile.vy;

    // Check if shot has gone above the moon
    if (bgMoon && projectile.y < bgMoon.y) projectile.moonShot = true;

    let hit = false, hitX = projectile.x, hitY = projectile.y;
    const steps = Math.ceil(Math.max(Math.abs(projectile.vx), Math.abs(projectile.vy)));
    for (let s = 0; s <= steps; s++) {
      const sx = projectile.x - projectile.vx + (projectile.vx * s / steps);
      const sy = projectile.y - projectile.vy + (projectile.vy * s / steps);
      const tx = Math.round(sx);
      if (tx >= 0 && tx < GW && sy >= terrainY[tx]) { hit = true; hitX = sx; hitY = terrainY[tx]; break; }
    }
    const oob = projectile.x < -20 || projectile.x > GW+20 || projectile.y > GH+20;

    if (hit || oob) {
      if (hit) {
        spawnParticles(hitX, hitY, players[currentPlayer].color);
        blastTerrain(hitX, hitY, 35);
        soundImpact();
        players.forEach((target, idx) => {
          if (idx === currentPlayer) return;
          const dx = target.x - hitX, dy = target.y - hitY;
          if (Math.sqrt(dx*dx + dy*dy) < 40) {
            const dmg = projectile.moonShot ? 2 : 1;
            target.hp = Math.max(0, target.hp - dmg);
            spawnParticles(target.x, target.y, target.color);
            if (projectile.moonShot) {
              spawnParticles(target.x, target.y, '#ffffff');
              flashMoonShot();
            }
            soundHit();
            updateUI();
            if (target.hp === 0) {
              gameOver = true;
              setTimeout(() => showMessage(`${players[currentPlayer].name} WINS! 🎉\nTap R to restart`), 800);
            }
          }
        });
      }
      projectile = null; fireCooldown = true;
      if (!gameOver) setTimeout(switchTurn, 1200);
    }
  }

  particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life -= p.decay; });
  particles = particles.filter(p => p.life > 0);
  players.forEach(p => { p.y = terrainY[Math.max(0, Math.min(GW-1, Math.round(p.x)))]; });
}

// ---- LOOP ----
function loop() {
  update();
  resetTransform();
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  applyScale();
  drawTerrain();
  drawAngleGuide();
  players.forEach((p, i) => drawPlayer(p, i));
  drawProjectile();
  drawParticles();
  drawPower();
  resetTransform();
  requestAnimationFrame(loop);
}

initGame();
loop();
</script>
